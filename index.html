<div class="shooting-star">

<!-- Floating Particles -->

<div id="particles"></div>

<!-- Main -->

<main>

    <!-- Scene 1 -->

    <section id="scene1" class="scene active">

        <div class="content">

            </span>

            <h1>

                Make a Wish Di

            </h1>

        </div>

    </section>

    <!-- Scene 2 -->

    <section id="scene2" class="scene">

        <div class="content">

            <h2>

                May all your wishes

                <br>

                come true.

            </h2>

            <div class="heart"></div>

        </div>

    </section>

    <!-- Scene 3 -->

    <section id="scene3" class="scene">

        <div class="content">

            <span class="small-title">

                With Love

            </span>

            <h1 class="birthday">

                Happy Birthday

            </h1>

            <h3>

                My Dearest Sister

            </h3>

            <p>

                You are the brightest star in our family.

            </p>

        </div>

    </section>
